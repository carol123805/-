<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>寶藏獵人：挑戰模式</title>
    <style>
        body { 
            font-family: 'Segoe UI', '微軟正黑體', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            background-color: #1a252f; color: #ecf0f1; min-height: 100vh; margin: 0; padding: 20px;
        }
        h1 { color: #f1c40f; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); margin-bottom: 10px; }
        .status-container { display: flex; gap: 20px; margin-bottom: 15px; font-size: 1.1rem; background: rgba(0,0,0,0.3); padding: 10px 25px; border-radius: 50px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .highlight { color: #e74c3c; font-weight: bold; font-size: 1.3rem; }
        
        #game-board { 
            display: grid; 
            grid-template-columns: repeat(6, 50px); 
            grid-template-rows: repeat(5, 50px); 
            gap: 4px; border: 8px solid #34495e; padding: 5px; background-color: #2c3e50; border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
        .cell {
            width: 50px; height: 50px; background-color: #95a5a6;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; font-weight: bold; cursor: pointer; border: 3px outset #bdc3c7; box-sizing: border-box;
            transition: all 0.1s; user-select: none;
        }
        .cell:hover:not(.revealed) { background-color: #7f8c8d; transform: scale(1.05); }
        .cell.revealed { background-color: #d5dbdb; color: #333; border: 1px solid #7f8c8d; cursor: default; transform: none; }
        .cell.mine { background-color: #8e44ad !important; color: white; } 
        .cell.treasure { background-color: #f1c40f !important; border: 1px solid #e67e22; }

        .n1 { color: #2980b9; } .n2 { color: #27ae60; } .n3 { color: #e74c3c; } .n4 { color: #8e44ad; }
        .n5 { color: #d35400; } .n6 { color: #16a085; }

        .reward-info {
            margin-top: 25px; padding: 15px 20px; background: rgba(0,0,0,0.5); border-radius: 12px; line-height: 1.7;
            border-left: 5px solid #2ecc71; width: 310px; font-size: 0.95rem;
        }
        .reward-title { color: #2ecc71; font-weight: bold; font-size: 1.05rem; margin-bottom: 6px; display: block; }

        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.88); align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(8px);
        }
        .modal-content {
            background: #fff; color: #333; padding: 35px; border-radius: 20px; text-align: center; 
            max-width: 300px; box-shadow: 0 0 40px rgba(241, 196, 15, 0.6); border: 2px solid #f1c40f;
        }
        .btn-restart { 
            margin-top: 25px; padding: 12px 35px; background: #2ecc71; color: white; 
            border: none; border-radius: 30px; cursor: pointer; font-size: 1.1rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>💎 寶藏獵人</h1>
    
    <div class="status-container">
        <div>挑戰次數：<span id="click-count" class="highlight">0</span></div>
        <div>寶藏：<span id="treasure-count" class="highlight">0</span> / 3</div>
    </div>

    <div id="game-board"></div>

    <div class="reward-info">
        <span class="reward-title">🏆 挑戰獎勵：</span>
        • 挑戰 <b>1-10</b> 次成功：💰 <b>20</b> 枚金幣<br>
        • 挑戰 <b>11-20</b> 次成功：💰 <b>10</b> 枚金幣<br>
        • 挑戰 <b>21</b> 次以上成功：💰 <b>5</b> 枚金幣
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2 id="result-title">🎊 探險完成！</h2>
            <p id="result-detail" style="font-size: 1.1rem; line-height: 1.6;"></p>
            <button class="btn-restart" onclick="location.reload()">再次挑戰</button>
        </div>
    </div>

    <script>
        const cols = 6, rows = 5, totalCells = 30;
        const totalTreasures = 3, totalMines = 7;
        let clickCount = 0;
        let foundTreasures = 0;
        let isGameOver = false;
        let data = [];

        function init() {
            const boardElement = document.getElementById('game-board');
            let pool = new Array(totalCells).fill('empty');
            
            let tCount = 0;
            while(tCount < totalTreasures) {
                let r = Math.floor(Math.random() * totalCells);
                if(pool[r] === 'empty') { pool[r] = 'treasure'; tCount++; }
            }

            let mCount = 0;
            while(mCount < totalMines) {
                let r = Math.floor(Math.random() * totalCells);
                if(pool[r] === 'empty') { pool[r] = 'mine'; mCount++; }
            }

            for(let i=0; i<totalCells; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.addEventListener('click', () => playerClick(i));
                boardElement.appendChild(cell);
                
                data.push({ 
                    type: pool[i], 
                    revealed: false, 
                    element: cell, 
                    neighborMines: getNeighborMinesCount(i, pool)
                });
            }
        }

        function getNeighborMinesCount(index, pool) {
            let count = 0, r = Math.floor(index / cols), c = index % cols;
            for (let i = -1; i <= 1; i++) {
                for (let j = -1; j <= 1; j++) {
                    if (i === 0 && j === 0) continue;
                    let nr = r + i, nc = c + j;
                    if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && pool[nr * cols + nc] === 'mine') count++;
                }
            }
            return count;
        }

        function playerClick(i) {
            if(isGameOver || data[i].revealed) return;

            // 增加挑戰次數：踩雷+2，其餘+1
            if(data[i].type === 'mine') {
                clickCount += 2;
            } else {
                clickCount += 1;
            }
            
            document.getElementById('click-count').innerText = clickCount;
            revealLogic(i);

            if(foundTreasures === totalTreasures) handleWin();
        }

        function revealLogic(i) {
            const cell = data[i];
            if (cell.revealed) return;

            cell.revealed = true;
            cell.element.classList.add('revealed');

            if(cell.type === 'treasure') {
                foundTreasures++;
                cell.element.innerText = '💎';
                cell.element.classList.add('treasure');
                document.getElementById('treasure-count').innerText = foundTreasures;
            } else if(cell.type === 'mine') {
                cell.element.innerText = '👾';
                cell.element.classList.add('mine');
            } else {
                if (cell.neighborMines > 0) {
                    cell.element.innerText = cell.neighborMines;
                    cell.element.classList.add('n' + cell.neighborMines);
                } else {
                    let r = Math.floor(i / cols), c = i % cols;
                    for (let ni = -1; ni <= 1; ni++) {
                        for (let nj = -1; nj <= 1; nj++) {
                            let nr = r + ni, nc = c + nj;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                                revealLogic(nr * cols + nc);
                            }
                        }
                    }
                }
            }
        }

        function handleWin() {
            isGameOver = true;
            document.getElementById('game-board').style.pointerEvents = 'none';
            
            // 亮出所有地雷與寶藏
            data.forEach(cell => {
                if(!cell.revealed) {
                    cell.element.classList.add('revealed');
                    if(cell.type === 'mine') { cell.element.innerText = '👾'; cell.element.classList.add('mine'); }
                    else if(cell.type === 'treasure') { cell.element.innerText = '💎'; cell.element.classList.add('treasure'); }
                }
            });

            // 根據點擊次數結算
            let coins = 0;
            if (clickCount >= 1 && clickCount <= 10) {
                coins = 20;
            } else if (clickCount >= 11 && clickCount <= 20) {
                coins = 10;
            } else {
                coins = 5;
            }

            setTimeout(() => {
                document.getElementById('result-detail').innerHTML = 
                    `最終挑戰次數：<b>${clickCount}</b><br><br>` +
                    `<span style="color: #f1c40f; font-size: 2.2rem; font-weight: bold;">💰 ${coins} 金幣</span>`;
                document.getElementById('modal').style.display = 'flex';
            }, 1500);
        }

        init();
    </script>
</body>
</html>
