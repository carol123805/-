<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勇者爬梯子：命運之門</title>
    <style>
        body {
            font-family: 'Segoe UI', '微軟正黑體', sans-serif;
            background-color: #0d1117;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0; padding: 20px;
        }

        h1 { color: #f1c40f; text-shadow: 0 0 10px rgba(241,196,15,0.4); margin-bottom: 5px; }
        .sub-title { color: #888; margin-bottom: 25px; }

        #game-container {
            position: relative;
            width: 420px;
        }

        /* 角色選擇區 - 改為更可愛的組合 */
        .character-row {
            display: flex;
            justify-content: space-around;
            margin-bottom: 15px;
        }

        .char-box {
            width: 75px; height: 75px;
            background: #161b22; border: 3px solid #30363d;
            border-radius: 20px; display: flex;
            align-items: center; justify-content: center;
            font-size: 2.8rem; cursor: pointer; transition: 0.3s;
            z-index: 20;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .char-box:hover { border-color: #f1c40f; transform: translateY(-5px); background: #1c2128; }
        .char-box.selected { border-color: #ff4757; box-shadow: 0 0 25px rgba(255,71,87,0.6); transform: scale(1.15); }

        /* 梯子容器 */
        .ladder-wrapper {
            position: relative;
            width: 420px; height: 380px;
            background: rgba(255,255,255,0.02);
            border-radius: 10px; overflow: hidden;
            border: 2px solid #30363d;
        }

        #ladder-canvas { display: block; z-index: 1; }

        /* 迷霧遮罩 (只蓋住下半部) */
        #mask {
            position: absolute;
            bottom: 0; left: 0; width: 100%; 
            height: 280px; /* 留出上方約 100px 可見 */
            background: linear-gradient(to bottom, #0d1117 0%, #0d1117 85%, rgba(13,17,23,0) 100%);
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #444;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 獎勵區 - 預先秀出來 */
        .reward-row {
            display: flex; 
            justify-content: space-around;
            margin-top: 15px; 
            background: rgba(255,255,255,0.05);
            padding: 10px 0;
            border-radius: 12px;
            border: 1px solid #30363d;
        }

        .reward-box {
            width: 90px; text-align: center; font-size: 0.85rem;
            padding: 10px 2px; border-radius: 8px; 
            color: #f1c40f; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; gap: 5px;
        }
        
        .reward-icon { font-size: 1.5rem; }

        /* 燈箱 */
        #modal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white; color: #333; padding: 40px;
            border-radius: 25px; text-align: center; border: 5px solid #f1c40f;
        }

        .prize-highlight { color: #e74c3c; font-size: 2rem; font-weight: bold; margin: 15px 0; }

        .btn-reset {
            margin-top: 20px; padding: 12px 40px;
            background: #2ecc71; color: white; border: none;
            border-radius: 30px; cursor: pointer; font-size: 1.1rem; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🪜 勇者爬梯子</h1>
    <p class="sub-title">獎勵就在前方，誰能帶領你走向大獎？</p>

    <div id="game-container">
        <div class="character-row">
            <div class="char-box" onclick="selectHero(0)">🦁</div>
            <div class="char-box" onclick="selectHero(1)">🦊</div>
            <div class="char-box" onclick="selectHero(2)">🐨</div>
            <div class="char-box" onclick="selectHero(3)">🐯</div>
        </div>

        <div class="ladder-wrapper">
            <div id="mask">命運迷霧</div>
            <canvas id="ladder-canvas" width="420" height="380"></canvas>
        </div>

        <div class="reward-row" id="reward-ui">
            <div class="reward-box">
                <div class="reward-icon">💰</div>
                <div id="reward-0"></div>
            </div>
            <div class="reward-box">
                <div class="reward-icon">🎟️</div>
                <div id="reward-1"></div>
            </div>
            <div class="reward-box">
                <div class="reward-icon">👕</div>
                <div id="reward-2"></div>
            </div>
            <div class="reward-box">
                <div class="reward-icon">😅</div>
                <div id="reward-3"></div>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h2>✨ 探險達成 ✨</h2>
            <div id="prize-text" class="prize-highlight"></div>
            <p>恭喜你獲得以上獎勵！</p>
            <button class="btn-reset" onclick="location.reload()">重新開始</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('ladder-canvas');
        const ctx = canvas.getContext('2d');
        const mask = document.getElementById('mask');
        
        const numLines = 4;
        const spacing = canvas.width / (numLines + 1);
        const prizes = ["10 金幣", "抽獎券", "勇者造型", "銘謝惠顧"];
        
        let shuffledPrizes = [];
        let horizontalLines = [];
        let isStarted = false;

        function init() {
            // 隨機排列獎勵
            shuffledPrizes = [...prizes].sort(() => Math.random() - 0.5);
            shuffledPrizes.forEach((p, i) => {
                document.getElementById(`reward-${i}`).innerText = p;
            });

            // 生成隨機橫樑
            horizontalLines = [];
            for (let i = 0; i < 22; i++) {
                let col = Math.floor(Math.random() * (numLines - 1));
                let y = Math.random() * (canvas.height - 40) + 20;
                
                // 確保最上方可見區域至少有兩條線，增加真實感
                if(i < 4) y = Math.random() * 60 + 20;

                if (!horizontalLines.some(l => Math.abs(l.y - y) < 18 && l.col === col)) {
                    horizontalLines.push({ col, y });
                }
            }
            drawBaseLadder();
        }

        function drawBaseLadder() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#30363d';
            ctx.lineWidth = 3;
            // 垂直線
            for (let i = 1; i <= numLines; i++) {
                ctx.beginPath();
                ctx.moveTo(i * spacing, 0); ctx.lineTo(i * spacing, canvas.height);
                ctx.stroke();
            }
            // 橫樑
            horizontalLines.forEach(l => {
                ctx.beginPath();
                ctx.moveTo((l.col+1)*spacing, l.y); ctx.lineTo((l.col+2)*spacing, l.y);
                ctx.stroke();
            });
        }

        async function selectHero(index) {
            if (isStarted) return;
            isStarted = true;

            // UI 反饋
            const boxes = document.querySelectorAll('.char-box');
            boxes.forEach((b, i) => i === index ? b.classList.add('selected') : b.style.opacity = '0.2');

            // 揭開迷霧
            mask.style.transform = 'translateY(100%)';

            // 等待動畫後開始跑路徑
            setTimeout(() => {
                startPathAnimation(index);
            }, 1000);
        }

        async function startPathAnimation(startCol) {
            let curX = (startCol + 1) * spacing;
            let curY = 0;
            let curIdx = startCol;

            ctx.strokeStyle = '#ff4757'; 
            ctx.lineWidth = 6;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(255,71,87,0.8)';

            let lines = [...horizontalLines].sort((a, b) => a.y - b.y);

            while (curY < canvas.height) {
                let nextLine = lines.find(l => l.y > curY && (l.col === curIdx || l.col === curIdx - 1));
                let targetY = nextLine ? nextLine.y : canvas.height;

                await animateLine(curX, curY, curX, targetY);
                curY = targetY;

                if (nextLine) {
                    let targetX = (nextLine.col === curIdx) ? (curIdx + 2) * spacing : (curIdx) * spacing;
                    await animateLine(curX, curY, targetX, curY);
                    curX = targetX;
                    curIdx = (nextLine.col === curIdx) ? curIdx + 1 : curIdx - 1;
                }
            }

            // 顯示結果
            setTimeout(() => {
                document.getElementById('prize-text').innerText = shuffledPrizes[curIdx];
                document.getElementById('modal').style.display = 'flex';
            }, 600);
        }

        function animateLine(x1, y1, x2, y2) {
            return new Promise(resolve => {
                let speed = 3; 
                let dx = x2 - x1, dy = y2 - y1;
                let distance = Math.sqrt(dx*dx + dy*dy);
                let currentPos = 0;

                function step() {
                    currentPos += speed * 4;
                    let ratio = Math.min(currentPos / distance, 1);
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x1 + dx * ratio, y1 + dy * ratio);
                    ctx.stroke();

                    if (ratio < 1) requestAnimationFrame(step);
                    else resolve();
                }
                requestAnimationFrame(step);
            });
        }

        init();
    </script>
</body>
</html>
